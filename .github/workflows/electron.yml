name: Build Desktop Escriba

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set Dynamic Version
        shell: bash
        run: |
          VERSION=$(date +%Y.%-m.%-d)-${GITHUB_SHA::7}
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Setting version to $VERSION and build time to $BUILD_TIME"
          npm version $VERSION --allow-same-version --no-git-tag-version
          perl -i -pe "s/id=\"appVersion\">.*?<\/span>/id=\"appVersion\">$VERSION<\/span>/g" index.html
          perl -i -pe "s/const CURRENT_BUILD_TIME = new Date\('.*?'\);/const CURRENT_BUILD_TIME = new Date('$BUILD_TIME');/g" src/js/app.js


      - name: Install Dependencies
        run: npm install

      - name: Build Electron App
        run: npm run electron:build

      - name: Upload Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Escriba-Windows
          path: dist/*.exe

      - name: Upload Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Escriba-Linux
          path: dist/*.AppImage

      - name: Upload Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Escriba-macOS
          path: dist/*.dmg

  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install

      - name: Build Android App
        run: npm run mobile:build

      - name: Upload Artifacts (Android)
        uses: actions/upload-artifact@v4
        with:
          name: Escriba-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: [build, android-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release-files
          find artifacts -name "*.exe" -exec cp {} release-files/ \;
          find artifacts -name "*.AppImage" -exec cp {} release-files/ \;
          find artifacts -name "*.dmg" -exec cp {} release-files/ \;
          find artifacts -name "*.apk" -exec cp {} release-files/Escriba-Android-Nightly.apk \;

      - name: Clear Old Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=$(gh release view nightly --json assets --jq '.assets[].name' || echo "")
          if [ -n "$assets" ]; then
            for asset in $assets; do
              gh release delete-asset nightly "$asset" -y
            done
          fi

      - name: Update Nightly Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push -f origin nightly

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          body: "Automatic nightly build from the main branch. Updated on ${{ github.event.head_commit.timestamp }}"
          draft: false
          prerelease: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
